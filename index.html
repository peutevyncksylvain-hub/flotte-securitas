<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<style>
  * { box-sizing: border-box; }
  body { margin: 0; background:#0c1f2e; font-family: system-ui, -apple-system, sans-serif; color: #e8efed; }
  input::placeholder, textarea::placeholder { color: #4a5c5e; }
  input:focus, textarea:focus { outline: none; border-color: #e8384f !important; }
  button { cursor: pointer; font-family: inherit; }
  button:focus-visible { outline: 2px solid #e8384f; outline-offset: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  @media (min-width: 760px) {
    .app { max-width: 1100px; padding: 32px 32px 60px; }
    .title { font-size: 32px; }
    .eyebrow { font-size: 12px; }
    .stats-row { max-width: 600px; }
    .stat-value { font-size: 22px; }
    .search-row { max-width: 600px; }
    .toolbar-row { justify-content: flex-start; gap: 8px; }
    .list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .card { height: 100%; }
    .overlay { align-items: center; }
    .sheet { border-radius: 20px; max-width: 480px; max-height: 86vh; }
  }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; color: #e8384f; font-weight: 600; margin-bottom: 4px; }
  .title { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .author-tag { font-size: 11px; color: #5a6b6d; }
  .author-tag button { background:none;border:none;color:#e8384f;font-size:11px;padding:0;margin-left:6px; }

  .alert-banner { display:flex; align-items:flex-start; gap:8px; background:#3a1818; border:1px solid #6b2424; color:#f87171; font-size:13px; padding:10px 12px; border-radius:10px; margin-bottom:14px; }
  .alert-banner b { color:#fca5a5; }

  .stats-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .stat-pill { flex: 1; border: 1px solid #234156; background: #13293b; border-radius: 12px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: all .15s; }
  .stat-pill.active-green { border-color: #4ade80; background: #4ade801a; }
  .stat-pill.active-yellow { border-color: #fbbf24; background: #fbbf241a; }
  .stat-pill.active-red { border-color: #f87171; background: #f871711a; }
  .stat-pill.active-panne { border-color: #fb923c; background: #fb923c1a; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; display: block; margin-bottom: 2px; }
  .stat-value { font-size: 17px; font-weight: 700; }
  .stat-label { font-size: 9px; color: #8a9a9c; text-align:center; }

  .chip-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:12px; -webkit-overflow-scrolling:touch; }
  .chip-row::-webkit-scrollbar { display:none; }
  .chip { flex:0 0 auto; background:#13293b; border:1px solid #234156; color:#a8b8b6; border-radius:20px; padding:6px 12px; font-size:12px; white-space:nowrap; }
  .chip.active { background:#e8384f; color:#0c1f2e; border-color:#e8384f; font-weight:600; }

  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-box { flex: 1; display: flex; align-items: center; gap: 8px; background: #13293b; border: 1px solid #234156; border-radius: 10px; padding: 10px 12px; }
  .search-input { border: none; background: transparent; color: #e8efed; font-size: 14px; width: 100%; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: #e8384f; color: #0c1f2e; border: none; border-radius: 10px; padding: 0 14px; font-weight: 600; font-size: 14px; }
  .toolbar-row { display:flex; justify-content:flex-end; margin-bottom: 14px; }
  .export-btn { display:flex; align-items:center; gap:5px; background:#13293b; border:1px solid #234156; color:#a8b8b6; border-radius:8px; padding:6px 10px; font-size:12px; }

  .error-banner { display: flex; align-items: center; gap: 6px; background: #3a1818; border: 1px solid #6b2424; color: #f87171; font-size: 12px; padding: 8px 10px; border-radius: 8px; margin-bottom: 12px; }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .empty-state { text-align: center; color: #5a6b6d; font-size: 14px; padding: 40px 20px; }
  .card { border: 1px solid; border-radius: 14px; padding: 14px; text-align: left; width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .plaque-tag { font-weight: 700; font-size: 15px; letter-spacing: 0.02em; }
  .tournee-tag { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #8a9a9c; background: #0c1f2e; padding: 2px 8px; border-radius: 20px; }
  .status-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; }
  .status-badge.panne { color:#fdba74; }
  .status-dot-small { width: 6px; height: 6px; border-radius: 50%; }
  .bar-track { height: 5px; background: #0c1f2e; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .card-bottom { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #a8b8b6; flex-wrap: wrap; }

  .rest-text { flex: 1; }
  .mini-warn { font-size: 11px; color: #fbbf24; }

  .archive-toggle { text-align: center; color: #5a6b6d; font-size: 12px; margin-top: 16px; background: none; border: none; width: 100%; padding: 10px; }
  .tab-row { display: flex; background: #13293b; border: 1px solid #234156; border-radius: 12px; padding: 3px; margin-top: 16px; }
  .tab-btn { flex: 1; background: none; border: none; color: #8a9a9c; font-size: 12px; font-weight: 600; padding: 9px 6px; border-radius: 9px; text-align: center; }
  .tab-btn.active { background: #e8384f; color: #fff; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .sheet { background: #13293b; border-radius: 20px 20px 0 0; padding: 20px 18px 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .sheet-plaque { font-size: 22px; font-weight: 700; margin: 0; }
  .icon-btn { background: #0c1f2e; border: none; border-radius: 8px; padding: 6px; }
  .field { margin-bottom: 14px; }
  .field-label { display: block; font-size: 12px; color: #8a9a9c; margin-bottom: 6px; }
  .input { width: 100%; background: #0c1f2e; border: 1px solid #234156; border-radius: 10px; padding: 11px 12px; color: #e8efed; font-size: 14px; font-family: inherit; }
  .progress-text { font-size: 11px; color: #8a9a9c; margin-top: 6px; }
  .secondary-btn { background: #1a2e22; border: 1px solid #2d5a3d; color: #4ade80; border-radius: 10px; padding: 0 12px; font-size: 12px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .save-btn { width: 100%; background: #e8384f; color: #0c1f2e; border: none; border-radius: 12px; padding: 13px; font-weight: 700; font-size: 15px; margin-top: 6px; }
  .save-btn.disabled { opacity: .4; pointer-events: none; }
  .delete-link { width: 100%; background: none; border: none; color: #c97a7a; font-size: 12px; margin-top: 14px; text-align: center; }
  .archive-link { width: 100%; background: none; border: none; color: #8a9a9c; font-size: 12px; margin-top: 10px; text-align: center; }
  .restitue-btn { width: 100%; background: #e8384f; color: #fff; border: none; border-radius: 12px; padding: 13px; font-weight: 700; font-size: 15px; margin-top: 18px; }
  .confirm-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
  .confirm-delete-btn { background: #6b2424; color: #fff; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; }
  .loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .loading-dot { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #234156; border-top-color: #e8384f; animation: spin .8s linear infinite; }
  svg.ic { display: block; flex-shrink: 0; }

  .panne-toggle-row { display:flex; align-items:center; justify-content:space-between; background:#0c1f2e; border:1px solid #234156; border-radius:10px; padding: 10px 12px; margin-bottom: 14px; }
  .panne-toggle-row span { font-size: 13px; }
  .switch { position: relative; width: 40px; height: 22px; background: #234156; border-radius: 12px; border: none; padding: 0; }
  .switch.on { background: #fb923c; }
  .switch span.knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left .15s; }
  .switch.on span.knob { left: 20px; }

  .date-row { display:flex; gap: 8px; }
  .date-field { flex: 1; }
  .date-status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }

  .photo-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; display:block; }
  .photo-actions { display: flex; gap: 8px; margin-bottom: 14px; }
  .link-btn { background: none; border: none; color: #e8384f; font-size: 12px; }

  .history-list { margin-top: 4px; }
  .history-item { font-size: 12px; color: #c8d4d2; padding: 8px 0; border-bottom: 1px solid #1e2a29; }
  .history-item:last-child { border-bottom: none; }
  .history-meta { color: #5a6b6d; font-size: 11px; margin-top: 2px; }
  .history-empty { color: #5a6b6d; font-size: 12px; padding: 8px 0; }

  .name-overlay { position: fixed; inset: 0; background: #0c1f2e; display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 100; }
  .name-card { width: 100%; max-width: 360px; }
  .name-card h2 { font-size: 20px; margin: 0 0 6px; }
  .name-card p { color: #8a9a9c; font-size: 13px; margin: 0 0 18px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (regs) {
    regs.forEach(function (r) { r.unregister(); });
  });
}
if (window.caches && caches.keys) {
  caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
}

var PROJECT_ID = "flottesecuritaslille";
var IDENTITY_KEY = "AIzaSyA28Un-O0vps6PZgi-iDwFBW1geH5JOmRM";
var FS_BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents/vehicles';
var MARQUE_INTERVALS = { Renault: 25000, Toyota: 15000 };
var DEFAULT_INTERVAL = 15000;
var YELLOW_BUFFER = 2500;
var RED_BUFFER = 1000;
var HISTORY_LIMIT = 20;

function usernameToEmail(username) {
  var clean = username.trim().toLowerCase().replace(/[^a-z0-9.]/g, '');
  if (!clean) clean = 'user' + Date.now();
  return clean + '@flotte-app.local';
}

function mapAuthError(data) {
  var msg = (data && data.error && data.error.message) || '';
  if (msg.indexOf('EMAIL_NOT_FOUND') >= 0 || msg.indexOf('INVALID_PASSWORD') >= 0 || msg.indexOf('INVALID_LOGIN_CREDENTIALS') >= 0) return "Nom d'utilisateur ou mot de passe incorrect.";
  if (msg.indexOf('EMAIL_EXISTS') >= 0) return "Ce nom d'utilisateur existe déjà.";
  if (msg.indexOf('WEAK_PASSWORD') >= 0) return "Mot de passe trop court (6 caractères minimum).";
  return msg ? ("Erreur : " + msg) : "Une erreur est survenue.";
}

function setAuthFromResponse(data) {
  var auth = {
    idToken: data.idToken,
    refreshToken: data.refreshToken,
    expiresAt: Date.now() + Number(data.expiresIn) * 1000,
    uid: data.localId,
  };
  localStorage.setItem('fleetAuth', JSON.stringify(auth));
  state.auth = auth;
  return auth;
}

var USERS_BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents/users';

function fetchUserProfile(uid) {
  return ensureValidToken().then(function (token) {
    return fetch(USERS_BASE + '/' + uid, { headers: { Authorization: 'Bearer ' + token } });
  }).then(function (res) {
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function (doc) { return doc ? fsToObj(doc.fields) : null; });
}

function saveUserProfile(uid, profile) {
  return ensureValidToken().then(function (token) {
    return fetch(USERS_BASE + '/' + uid, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ fields: objToFields(profile) }),
    });
  }).then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); });
}

function applyProfile(profile) {
  state.userProfile = profile;
  state.authorName = profile ? ((profile.prenom || '') + ' ' + (profile.nom || '')).trim() || profile.username || '' : '';
  localStorage.setItem('fleetProfile', JSON.stringify(profile || {}));
}

function signUp(username, password, profile) {
  var email = usernameToEmail(username);
  return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + IDENTITY_KEY, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password, returnSecureToken: true }),
  }).then(function (res) { return res.json().then(function (data) { if (!res.ok) throw new Error(mapAuthError(data)); return data; }); })
    .then(function (data) {
      var auth = setAuthFromResponse(data);
      var fullProfile = Object.assign({ username: username.trim(), actif: true, admin: false }, profile);
      return saveUserProfile(auth.uid, fullProfile).then(function () { applyProfile(fullProfile); });
    });
}

function signIn(username, password) {
  var email = usernameToEmail(username);
  return fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=' + IDENTITY_KEY, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password, returnSecureToken: true }),
  }).then(function (res) { return res.json().then(function (data) { if (!res.ok) throw new Error(mapAuthError(data)); return data; }); })
    .then(function (data) {
      var auth = setAuthFromResponse(data);
      return fetchUserProfile(auth.uid).then(function (profile) {
        if (profile && profile.actif === false) {
          logout();
          throw new Error("Ce compte a été désactivé. Contacte un administrateur.");
        }
        applyProfile(profile || { username: username.trim(), prenom: '', nom: '', grade: '', actif: true, admin: false });
      });
    });
}

function fetchAllUsersRemote() {
  return ensureValidToken().then(function (token) {
    return fetch(USERS_BASE, { headers: { Authorization: 'Bearer ' + token } });
  }).then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function (data) {
      if (!data.documents) return [];
      return data.documents.map(function (doc) {
        var id = doc.name.split('/').pop();
        return Object.assign({ uid: id }, fsToObj(doc.fields));
      });
    });
}

function setUserActiveRemote(u, actif) {
  var profile = Object.assign({}, u);
  delete profile.uid;
  profile.actif = actif;
  return saveUserProfile(u.uid, profile);
}

function deleteUserProfileRemote(uid) {
  return ensureValidToken().then(function (token) {
    return fetch(USERS_BASE + '/' + uid, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
  }).then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); });
}

var pollIntervalId = null;
function startPolling() {
  if (pollIntervalId) clearInterval(pollIntervalId);
  load();
  pollIntervalId = setInterval(load, 4000);
}
function logout() {
  if (pollIntervalId) { clearInterval(pollIntervalId); pollIntervalId = null; }
  localStorage.removeItem('fleetAuth');
  localStorage.removeItem('fleetProfile');
  state.auth = null;
  state.userProfile = null;
  state.authorName = '';
  state.vehicles = null;
}

function ensureValidToken() {
  if (!state.auth) return Promise.reject(new Error('not authed'));
  if (state.auth.expiresAt - Date.now() > 60000) return Promise.resolve(state.auth.idToken);
  return fetch('https://securetoken.googleapis.com/v1/token?key=' + IDENTITY_KEY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(state.auth.refreshToken),
  }).then(function (res) {
    if (!res.ok) { logout(); throw new Error('session expirée'); }
    return res.json();
  }).then(function (data) {
    state.auth.idToken = data.id_token;
    state.auth.refreshToken = data.refresh_token;
    state.auth.expiresAt = Date.now() + Number(data.expires_in) * 1000;
    localStorage.setItem('fleetAuth', JSON.stringify(state.auth));
    return state.auth.idToken;
  });
}

var STATUS_STYLES = {
  green:  { border: '#2d5a3d', bg: '#1a2e22', dot: '#4ade80', label: 'OK' },
  yellow: { border: '#6b5419', bg: '#332a14', dot: '#fbbf24', label: 'Bientôt' },
  red:    { border: '#6b2424', bg: '#3a1818', dot: '#f87171', label: 'Urgent' },
};

var ICONS = {
  plus: "M12 5v14M5 12h14",
  x: "M18 6L6 18M6 6l18 18",
  search: "M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35",
  gauge: "M12 14l3-3M3.34 19a10 10 0 1117.32 0",
  map: "M9 20l-6-3V4l6 3 6-3 6 3v13l-6-3-6 3z",
  wrench: "M14.7 6.3a4 4 0 11-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 015.4-5.4z",
  chevron: "M9 18l6-6-6-6",
  alert: "M12 9v4m0 4h.01M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.7 3.86a2 2 0 00-3.4 0z",
  download: "M12 3v12m0 0l-4-4m4 4l4-4M4 19h16",
  camera: "M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z M12 17a4 4 0 100-8 4 4 0 000 8z",
  archive: "M21 8v13H3V8M1 3h22v5H1zM10 12h4",
};

function logoHtml(size) {
  size = size || 'normal';
  var dot = size === 'small' ? 10 : 14;
  var gap = size === 'small' ? 4 : 6;
  var fontSize = size === 'small' ? 16 : 22;
  return '<div style="display:flex;align-items:center;gap:' + gap + 'px;margin-bottom:' + (size === 'small' ? 4 : 16) + 'px;">' +
    '<span style="display:flex;gap:' + (gap - 1) + 'px;">' +
    '<span style="width:' + dot + 'px;height:' + dot + 'px;border-radius:50%;background:#e8384f;display:block;"></span>' +
    '<span style="width:' + dot + 'px;height:' + dot + 'px;border-radius:50%;background:#e8384f;display:block;"></span>' +
    '<span style="width:' + dot + 'px;height:' + dot + 'px;border-radius:50%;background:#e8384f;display:block;"></span>' +
    '</span>' +
    '<span style="font-size:' + fontSize + 'px;font-weight:700;color:#fff;letter-spacing:-0.01em;">Securitas</span>' +
    '</div>';
}

function icon(name, size, color) {
  size = size || 16; color = color || 'currentColor';
  return '<svg class="ic" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="' + ICONS[name] + '"/></svg>';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function uid() { return 'v_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function intervalFor(marque) {
  return MARQUE_INTERVALS[marque] || DEFAULT_INTERVAL;
}
function statusFor(kmSince, interval) {
  if (kmSince >= interval - RED_BUFFER) return 'red';
  if (kmSince >= interval - YELLOW_BUFFER) return 'yellow';
  return 'green';
}

function monthsSince(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  return (Date.now() - d.getTime()) / (1000 * 60 * 60 * 24 * 30.44);
}
function pneuStatus(dateStr) {
  var m = monthsSince(dateStr);
  if (m === null) return null;
  if (m >= 14) return 'red';
  if (m >= 10) return 'yellow';
  return 'green';
}
function pneuLabel(dateStr) {
  var m = monthsSince(dateStr);
  if (m === null) return "Date de changement non renseignée";
  return 'Changés il y a ' + Math.floor(m) + ' mois';
}

function dateStatus(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  var days = Math.floor((d - new Date()) / 86400000);
  if (days < 30) return 'red';
  if (days < 60) return 'yellow';
  return 'green';
}

function daysLabel(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  var days = Math.floor((d - new Date()) / 86400000);
  if (days < 0) return 'Dépassé de ' + Math.abs(days) + ' j';
  return 'Dans ' + days + ' j';
}

var RANK = { green: 0, yellow: 1, red: 2 };
function worstStatus() {
  var args = Array.prototype.slice.call(arguments).filter(function (s) { return s; });
  if (!args.length) return 'green';
  return args.reduce(function (a, b) { return RANK[b] > RANK[a] ? b : a; });
}

function fmtDateTime(iso) {
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// ---------- Conversion générique JS <-> Firestore REST ----------
function valToFirestore(val) {
  if (typeof val === 'string') return { stringValue: val };
  if (typeof val === 'number') return { integerValue: String(Math.trunc(val)) };
  if (typeof val === 'boolean') return { booleanValue: val };
  if (Array.isArray(val)) return { arrayValue: { values: val.map(valToFirestore) } };
  if (val && typeof val === 'object') return { mapValue: { fields: objToFields(val) } };
  return { nullValue: null };
}
function objToFields(obj) {
  var fields = {};
  Object.keys(obj).forEach(function (k) { fields[k] = valToFirestore(obj[k]); });
  return fields;
}
function fsToVal(fv) {
  if (!fv) return null;
  if ('stringValue' in fv) return fv.stringValue;
  if ('integerValue' in fv) return Number(fv.integerValue);
  if ('doubleValue' in fv) return fv.doubleValue;
  if ('booleanValue' in fv) return fv.booleanValue;
  if ('arrayValue' in fv) return ((fv.arrayValue && fv.arrayValue.values) || []).map(fsToVal);
  if ('mapValue' in fv) return fsToObj((fv.mapValue && fv.mapValue.fields) || {});
  return null;
}
function fsToObj(fields) {
  var obj = {};
  Object.keys(fields || {}).forEach(function (k) { obj[k] = fsToVal(fields[k]); });
  return obj;
}

function defaultVehicle() {
  return {
    bureau: '', plaque: '', tournee: '', km: 0, kmDernierEntretien: 0, pneuxNote: '', generalNote: '', pneuxAvantDate: '', pneuxArriereDate: '',
    assuranceDate: '', marque: '',
    enPanne: false, panneNote: '',
    archived: false,
    restitue: false, restitueDate: '',
    photo: '',
    history: [],
  };
}
function emptyVehicle() { return Object.assign({ id: uid() }, defaultVehicle()); }

function docToVehicle(doc) {
  var id = doc.name.split('/').pop();
  var data = fsToObj(doc.fields);
  return Object.assign({ id: id }, defaultVehicle(), data);
}
function vehicleToFields(v) {
  var plain = Object.assign({}, v);
  delete plain.id;
  plain.history = (plain.history || []).slice(-HISTORY_LIMIT);
  return { fields: objToFields(plain) };
}

function fetchVehiclesRemote() {
  return ensureValidToken().then(function (token) {
    return fetch(FS_BASE, { headers: { Authorization: 'Bearer ' + token } });
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function (data) {
    if (!data.documents) return [];
    return data.documents.map(docToVehicle);
  });
}
function saveVehicleRemote(v) {
  return ensureValidToken().then(function (token) {
    return fetch(FS_BASE + '/' + v.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(vehicleToFields(v)),
    });
  }).then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); });
}
function deleteVehicleRemote(id) {
  return ensureValidToken().then(function (token) {
    return fetch(FS_BASE + '/' + id, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
  }).then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); });
}

function addHistory(v, action, detail) {
  var entry = { date: new Date().toISOString(), author: state.authorName || '?', action: action, detail: detail || '' };
  var h = (v.history || []).slice();
  h.push(entry);
  v.history = h.slice(-HISTORY_LIMIT);
  return v;
}

  userProfile: JSON.parse(localStorage.getItem('fleetProfile') || 'null'),
  authorName: (function () { var p = JSON.parse(localStorage.getItem('fleetProfile') || 'null'); return p ? ((p.prenom || '') + ' ' + (p.nom || '')).trim() || p.username || '' : ''; })(),

  vehicles: null,

  showRestitues: false,
  selectedId: null,
  showNew: false,
  error: null,
  connErr: false,
  confirmDeleteId: null,
  confirmRestitueId: null,
};

function setState(patch) { Object.assign(state, patch); render(); }

function load() {
  fetchVehiclesRemote().then(function (list) {
    state.vehicles = list; state.connErr = false;
    if (!state.showNew && !state.selectedId && !state.showAccount && !state.showUserAdmin) render();
  }).catch(function () {
    state.connErr = true;
    if (!state.showNew && !state.selectedId && !state.showAccount && !state.showUserAdmin) render();
  });
}

function saveVehicle(v) {
  var vehicles = state.vehicles.slice();
  var idx = vehicles.findIndex(function (p) { return p.id === v.id; });
  if (idx >= 0) vehicles[idx] = v; else vehicles.push(v);
  setState({ vehicles: vehicles });
  saveVehicleRemote(v).then(function () { setState({ error: null }); })
    .catch(function () { setState({ error: "Échec de l'enregistrement, vérifie ta connexion." }); });
}
function removeVehicle(id) {
  setState({ vehicles: state.vehicles.filter(function (v) { return v.id !== id; }), selectedId: null, confirmDeleteId: null });
  deleteVehicleRemote(id).catch(function () { setState({ error: "Échec de la suppression." }); });
}

// ---------- Rendu ----------
function enrich(v) {
  var kmSince = Math.max(0, (v.km || 0) - (v.kmDernierEntretien || 0));
  var interval = intervalFor(v.marque);
  var restant = Math.max(0, interval - kmSince);
  var kmStatut = statusFor(kmSince, interval);
  var assStatut = dateStatus(v.assuranceDate);
  var pneuAvantStatut = pneuStatus(v.pneuxAvantDate);
  var pneuArriereStatut = pneuStatus(v.pneuxArriereDate);
  var overall = worstStatus(kmStatut, assStatut);
  return Object.assign({}, v, { kmSince: kmSince, restant: restant, interval: interval, kmStatut: kmStatut, assStatut: assStatut, pneuAvantStatut: pneuAvantStatut, pneuArriereStatut: pneuArriereStatut, status: overall });
}

function exportRows(list) {
  var header = ['Bureau', 'Plaque', 'Marque', 'Tournée', 'Km actuel', 'Km dernier entretien', 'Km restant avant entretien', 'Statut entretien', 'Assurance', 'Pneus avant (date)', 'Pneus arrière (date)', 'En panne', 'Note panne'];
  var rows = [header];
  list.forEach(function (v) {
    rows.push([
      v.bureau || '', v.plaque || '', v.marque || '', v.tournee || '',
      v.km || 0, v.kmDernierEntretien || 0, v.restant || 0,
      STATUS_STYLES[v.kmStatut].label, v.assuranceDate || '',
      v.pneuxAvantDate || '', v.pneuxArriereDate || '',
      v.enPanne ? 'Oui' : 'Non', v.panneNote || '',
    ]);
  });
  return rows;
}

function exportCsv(list) {
  var rows = exportRows(list);
  var csv = rows.map(function (r) {
    return r.map(function (c) { return '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"'; }).join(';');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'flotte_' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

// ---------- Génération XLSX native (sans librairie externe) ----------
var CRC_TABLE = (function () {
  var table = [];
  for (var n = 0; n < 256; n++) {
    var c = n;
    for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[n] = c >>> 0;
  }
  return table;
})();
function crc32(bytes) {
  var crc = 0xFFFFFFFF;
  for (var i = 0; i < bytes.length; i++) crc = CRC_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function strBytes(s) { return new TextEncoder().encode(s); }

function buildZip(files) {
  var localParts = [], centralParts = [], offset = 0;
  files.forEach(function (f) {
    var nameBytes = strBytes(f.name);
    var crc = crc32(f.data);
    var size = f.data.length;

    var local = new Uint8Array(30 + nameBytes.length);
    var dv = new DataView(local.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true); dv.setUint16(6, 0, true); dv.setUint16(8, 0, true);
    dv.setUint16(10, 0, true); dv.setUint16(12, 0x21, true);
    dv.setUint32(14, crc, true); dv.setUint32(18, size, true); dv.setUint32(22, size, true);
    dv.setUint16(26, nameBytes.length, true); dv.setUint16(28, 0, true);
    local.set(nameBytes, 30);
    localParts.push(local, f.data);

    var central = new Uint8Array(46 + nameBytes.length);
    var dvc = new DataView(central.buffer);
    dvc.setUint32(0, 0x02014b50, true);
    dvc.setUint16(4, 20, true); dvc.setUint16(6, 20, true); dvc.setUint16(8, 0, true); dvc.setUint16(10, 0, true);
    dvc.setUint16(12, 0, true); dvc.setUint16(14, 0x21, true);
    dvc.setUint32(16, crc, true); dvc.setUint32(20, size, true); dvc.setUint32(24, size, true);
    dvc.setUint16(28, nameBytes.length, true); dvc.setUint16(30, 0, true); dvc.setUint16(32, 0, true);
    dvc.setUint16(34, 0, true); dvc.setUint16(36, 0, true); dvc.setUint32(38, 0, true);
    dvc.setUint32(42, offset, true);
    central.set(nameBytes, 46);
    centralParts.push(central);

    offset += local.length + f.data.length;
  });

  var centralStart = offset;
  var centralSize = centralParts.reduce(function (a, b) { return a + b.length; }, 0);
  var end = new Uint8Array(22);
  var dve = new DataView(end.buffer);
  dve.setUint32(0, 0x06054b50, true);
  dve.setUint16(4, 0, true); dve.setUint16(6, 0, true);
  dve.setUint16(8, files.length, true); dve.setUint16(10, files.length, true);
  dve.setUint32(12, centralSize, true); dve.setUint32(16, centralStart, true);
  dve.setUint16(20, 0, true);

  var allParts = localParts.concat(centralParts, [end]);
  var totalLen = allParts.reduce(function (a, b) { return a + b.length; }, 0);
  var result = new Uint8Array(totalLen);
  var pos = 0;
  allParts.forEach(function (p) { result.set(p, pos); pos += p.length; });
  return result;
}

function xmlEscape(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function colLetter(idx) {
  var s = ''; idx++;
  while (idx > 0) { var rem = (idx - 1) % 26; s = String.fromCharCode(65 + rem) + s; idx = Math.floor((idx - 1) / 26); }
  return s;
}
function buildSheetXml(rows) {
  var xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach(function (row, ri) {
    xml += '<row r="' + (ri + 1) + '">';
    row.forEach(function (cell, ci) {
      var ref = colLetter(ci) + (ri + 1);
      if (typeof cell === 'number') {
        xml += '<c r="' + ref + '"><v>' + cell + '</v></c>';
      } else if (cell !== '') {
        xml += '<c r="' + ref + '" t="inlineStr"><is><t xml:space="preserve">' + xmlEscape(cell) + '</t></is></c>';
      }
    });
    xml += '</row>';
  });
  xml += '</sheetData></worksheet>';
  return xml;
}

var XLSX_CONTENT_TYPES = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
var XLSX_RELS = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
var XLSX_WORKBOOK = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Flotte" sheetId="1" r:id="rId1"/></sheets></workbook>';
var XLSX_WORKBOOK_RELS = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';

function exportXlsx(list) {
  var dataRows = exportRows(list);
  var rows = [['SECURITAS — Suivi de flotte']].concat([['Export du ' + new Date().toLocaleDateString('fr-FR')]], [[]], dataRows);
  var sheetXml = buildSheetXml(rows);
  var files = [
    { name: '[Content_Types].xml', data: strBytes(XLSX_CONTENT_TYPES) },
    { name: '_rels/.rels', data: strBytes(XLSX_RELS) },
    { name: 'xl/workbook.xml', data: strBytes(XLSX_WORKBOOK) },
    { name: 'xl/_rels/workbook.xml.rels', data: strBytes(XLSX_WORKBOOK_RELS) },
    { name: 'xl/worksheets/sheet1.xml', data: strBytes(sheetXml) },
  ];
  var zipBytes = buildZip(files);
  var blob = new Blob([zipBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'flotte_' + new Date().toISOString().slice(0, 10) + '.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
}

function render() {
  var root = document.getElementById('app');

  if (!state.auth) {
    var isSignup = state.authMode === 'signup';
    root.innerHTML =
      '<div class="name-overlay"><div class="name-card">' +
      logoHtml() +
      '<h2>' + (isSignup ? 'Créer un compte' : 'Connexion') + '</h2>' +
      '<p>' + (isSignup ? 'Renseigne tes informations pour accéder à la flotte.' : 'Connecte-toi pour accéder à la flotte partagée.') + '</p>' +
      (state.authError ? '<div class="error-banner" style="margin-bottom:14px;">' + icon('alert', 14, '#f87171') + ' ' + escapeHtml(state.authError) + '</div>' : '') +
      (isSignup ? (
        '<div class="field"><label class="field-label">Prénom</label><input id="authPrenom" class="input" placeholder="ex: Sylvain" /></div>' +
        '<div class="field"><label class="field-label">Nom</label><input id="authNom" class="input" placeholder="ex: Greco" /></div>' +
        '<div class="field"><label class="field-label">Grade</label><input id="authGrade" class="input" placeholder="ex: Agent, Chef d\'équipe..." /></div>' +
        '<div class="field"><label class="field-label">Bureau</label><input id="authBureau" class="input" placeholder="ex: Lille" /></div>'
      ) : '') +
      '<div class="field"><label class="field-label">Nom d\'utilisateur</label><input id="authUsername" class="input" placeholder="ex: sgreco" autocapitalize="none" /></div>' +
      '<div class="field"><label class="field-label">Mot de passe</label><input id="authPassword" type="password" class="input" placeholder="6 caractères minimum" /></div>' +
      '<button class="save-btn" id="authSubmit">' + (isSignup ? 'Créer mon compte' : 'Se connecter') + '</button>' +
      '<button class="link-btn" id="authToggle" style="display:block;width:100%;text-align:center;margin-top:14px;">' + (isSignup ? 'J\'ai déjà un compte' : 'Créer un compte') + '</button>' +
      '</div></div>';
    document.getElementById('authToggle').addEventListener('click', function () {
      setState({ authMode: isSignup ? 'login' : 'signup', authError: null });
    });
    var submitBtn = document.getElementById('authSubmit');
    var doSubmit = function () {
      var username = document.getElementById('authUsername').value.trim();
      var password = document.getElementById('authPassword').value;
      if (!username || password.length < 6) {
        setState({ authError: 'Nom d\'utilisateur requis et mot de passe de 6 caractères minimum.' });
        return;
      }
      submitBtn.textContent = '...';
      var action;
      if (isSignup) {
        var prenom = document.getElementById('authPrenom').value.trim();
        var nom = document.getElementById('authNom').value.trim();
        var grade = document.getElementById('authGrade').value.trim();
        var bureau = document.getElementById('authBureau').value.trim();
        if (!prenom || !nom) {
          setState({ authError: 'Le prénom et le nom sont requis.' });
          return;
        }
        action = signUp(username, password, { prenom: prenom, nom: nom, grade: grade, bureau: bureau });
      } else {
        action = signIn(username, password);
      }
      action.then(function () {
        if (!localStorage.getItem('fleetFilterBureau') && state.userProfile && state.userProfile.bureau) {
          state.filterBureau = state.userProfile.bureau;
          localStorage.setItem('fleetFilterBureau', state.filterBureau);
        }
        setState({ authError: null });
        startPolling();
      }).catch(function (e) {
        setState({ authError: e.message || 'Erreur de connexion.' });
      });
    };
    submitBtn.addEventListener('click', doSubmit);
    document.getElementById('authPassword').addEventListener('keydown', function (e) { if (e.key === 'Enter') doSubmit(); });
    return;
  }

  if (state.connErr) {
    root.innerHTML = '<div class="loading-screen">' + icon('alert', 28, '#f87171') +
      '<p style="color:#c98;text-align:center;padding:0 24px;font-size:13px;margin-top:12px;">Connexion à la base impossible.<br/>Vérifie ta connexion internet.</p></div>';
    return;
  }
  if (state.vehicles === null) {
    root.innerHTML = '<div class="loading-screen"><div class="loading-dot"></div><p style="color:#8a9a9c;margin-top:12px;">Chargement de la flotte…</p></div>';
    return;
  }

  var allEnriched = state.vehicles.map(enrich);
  var bureaux = Array.from(new Set(allEnriched.filter(function (v) { return !v.archived && v.bureau; }).map(function (v) { return v.bureau; }))).sort();
  var bureauScope = allEnriched.filter(function (v) { return !state.filterBureau || v.bureau === state.filterBureau; });
  var visibleBase = bureauScope.filter(function (v) {
    if (state.showRestitues) return v.restitue;
    if (state.showArchived) return v.archived && !v.restitue;
    return !v.archived && !v.restitue;
  });

  var tournees = Array.from(new Set(visibleBase.filter(function (v) { return !v.archived && v.tournee; }).map(function (v) { return v.tournee; }))).sort();

  var filtered = visibleBase.filter(function (v) {
    var q = state.query.toLowerCase();
    var matchQuery = !q || (v.plaque || '').toLowerCase().indexOf(q) >= 0 || (v.tournee || '').toLowerCase().indexOf(q) >= 0;
    var matchStatus = state.filterStatus === 'all' ? true : (state.filterStatus === 'panne' ? v.enPanne : v.status === state.filterStatus);
    var matchTournee = !state.filterTournee || v.tournee === state.filterTournee;
    return matchQuery && matchStatus && matchTournee;
  }).sort(function (a, b) { return b.kmSince - a.kmSince; });

  var counts = { green: 0, yellow: 0, red: 0, panne: 0 };
  visibleBase.forEach(function (v) { counts[v.status]++; if (v.enPanne) counts.panne++; });
  var archivedCount = bureauScope.filter(function (v) { return v.archived && !v.restitue; }).length;
  var restitueCount = bureauScope.filter(function (v) { return v.restitue; }).length;

  var urgentList = visibleBase.filter(function (v) { return v.status === 'red' || v.enPanne; });

  var html = '<div class="app">';
  html += '<div class="header"><div>' + logoHtml('small') + '<div class="eyebrow">SUIVI DE FLOTTE' + (state.filterBureau ? ' · ' + escapeHtml(state.filterBureau).toUpperCase() : ' · TOUS BUREAUX') + '</div><h1 class="title">Parc véhicules</h1>' +
    '<div class="author-tag">' + escapeHtml(state.authorName) + (state.userProfile && state.userProfile.grade ? ' · ' + escapeHtml(state.userProfile.grade) : '') +
    ' <button id="openAccount">mon compte</button>' +
    (state.userProfile && state.userProfile.admin ? ' · <button id="openUserAdmin">comptes</button>' : '') +
    ' · <button id="changeAuthor">déconnexion</button></div></div></div>';

  if (urgentList.length > 0 && !state.showArchived) {
    html += '<div class="alert-banner">' + icon('alert', 16, '#f87171') +
      '<span><b>' + urgentList.length + ' véhicule' + (urgentList.length > 1 ? 's' : '') + '</b> ' + (urgentList.length > 1 ? 'nécessitent' : 'nécessite') + ' une attention immédiate (entretien, assurance ou panne).</span></div>';
  }

  if (bureaux.length > 0) {
    html += '<div class="chip-row">';
    html += '<button class="chip' + (!state.filterBureau ? ' active' : '') + '" data-bureau="">Tous les bureaux</button>';
    bureaux.forEach(function (b) {
      html += '<button class="chip' + (state.filterBureau === b ? ' active' : '') + '" data-bureau="' + escapeHtml(b) + '">' + escapeHtml(b) + '</button>';
    });
    html += '</div>';
  }

  html += '<div class="stats-row">';
  ['green', 'yellow', 'red'].forEach(function (s) {
    var st = STATUS_STYLES[s];
    var activeClass = state.filterStatus === s ? ' active-' + s : '';
    html += '<button class="stat-pill' + activeClass + '" data-filter="' + s + '"><span class="stat-dot" style="background:' + st.dot + '"></span><span class="stat-value">' + counts[s] + '</span><span class="stat-label">' + st.label + '</span></button>';
  });
  html += '<button class="stat-pill' + (state.filterStatus === 'panne' ? ' active-panne' : '') + '" data-filter="panne"><span class="stat-dot" style="background:#fb923c"></span><span class="stat-value">' + counts.panne + '</span><span class="stat-label">Pannes</span></button>';
  html += '</div>';

  if (tournees.length > 0) {
    html += '<div class="chip-row">';
    html += '<button class="chip' + (!state.filterTournee ? ' active' : '') + '" data-tournee="">Toutes tournées</button>';
    tournees.forEach(function (t) {
      html += '<button class="chip' + (state.filterTournee === t ? ' active' : '') + '" data-tournee="' + escapeHtml(t) + '">' + escapeHtml(t) + '</button>';
    });
    html += '</div>';
  }

  html += '<div class="search-row"><div class="search-box">' + icon('search', 16, '#5a6b6d') +
    '<input id="searchInput" class="search-input" placeholder="Plaque ou tournée" value="' + escapeHtml(state.query) + '" /></div>' +
    '<button class="add-btn" id="addBtn">' + icon('plus', 18, '#0c1f2e') + ' Ajouter</button></div>';

  html += '<div class="toolbar-row"><button class="export-btn" id="exportBtn">' + icon('download', 14, '#a8b8b6') + ' CSV</button>' +
    '<button class="export-btn" id="exportXlsxBtn" style="margin-left:8px;">' + icon('download', 14, '#a8b8b6') + ' Excel</button></div>';

  if (state.error) html += '<div class="error-banner">' + icon('alert', 14, '#f87171') + ' ' + escapeHtml(state.error) + '</div>';

  html += '<div class="list">';
  if (filtered.length === 0) {
    html += '<div class="empty-state">' + (visibleBase.length === 0 ? (state.showArchived ? "Aucun véhicule archivé." : "Aucun véhicule pour l'instant. Ajoute le premier.") : "Aucun véhicule ne correspond à ta recherche.") + '</div>';
  }
  filtered.forEach(function (v) {
    var s = STATUS_STYLES[v.status];
    var pct = Math.min(100, (v.kmSince / v.interval) * 100);
    html += '<button class="card" data-open="' + v.id + '" style="border-color:' + s.border + ';background:' + s.bg + '">';
    html += '<div class="card-top"><div class="plaque-tag">' + escapeHtml(v.plaque || '—') + '</div>';
    if (v.bureau) html += '<div class="tournee-tag">' + escapeHtml(v.bureau) + '</div>';
    if (v.tournee) html += '<div class="tournee-tag">' + icon('map', 11, '#8a9a9c') + ' ' + escapeHtml(v.tournee) + '</div>';
    var avDot = v.pneuAvantStatut ? STATUS_STYLES[v.pneuAvantStatut].dot : '#5a6b6d';
    var arDot = v.pneuArriereStatut ? STATUS_STYLES[v.pneuArriereStatut].dot : '#5a6b6d';
    html += '<div class="tournee-tag"><span class="status-dot-small" style="background:' + avDot + '"></span> AV' +
      '<span class="status-dot-small" style="background:' + arDot + ';margin-left:6px;"></span> AR</div>';
    if (v.enPanne) {
      html += '<div class="status-badge panne">' + icon('wrench', 12, '#fdba74') + ' En panne</div>';
    } else {
      html += '<div class="status-badge" style="color:' + s.dot + '"><span class="status-dot-small" style="background:' + s.dot + '"></span>' + s.label + '</div>';
    }
    html += '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + s.dot + '"></div></div>';
    html += '<div class="card-bottom"><span class="km-text">' + icon('gauge', 12, '#a8b8b6') + ' ' + (v.km || 0).toLocaleString('fr-FR') + ' km</span>';
    html += '<span class="rest-text">' + (v.restant > 0 ? (v.restant.toLocaleString('fr-FR') + ' km avant entretien') : 'Entretien dépassé') + '</span>';
    if (v.assStatut === 'red') html += '<span class="mini-warn">' + icon('alert', 12, '#fbbf24') + '</span>';
    html += icon('chevron', 16, '#5a6b6d') + '</div></button>';
  });
  html += '</div>';

  var activeCount = bureauScope.filter(function (v) { return !v.archived && !v.restitue; }).length;
  var currentTab = state.showRestitues ? 'restitues' : (state.showArchived ? 'archives' : 'actifs');
  html += '<div class="tab-row">';
  html += '<button class="tab-btn' + (currentTab === 'actifs' ? ' active' : '') + '" data-view="actifs">Actifs (' + activeCount + ')</button>';
  html += '<button class="tab-btn' + (currentTab === 'archives' ? ' active' : '') + '" data-view="archives">Archivés (' + archivedCount + ')</button>';
  html += '<button class="tab-btn' + (currentTab === 'restitues' ? ' active' : '') + '" data-view="restitues">Restitués (' + restitueCount + ')</button>';
  html += '</div>';

  if (state.showAccount) html += renderAccountSheet();
  if (state.showUserAdmin) html += renderUserAdmin();
  if (state.showNew) html += renderModal();
  if (state.selectedId) {
    var sel = allEnriched.find(function (x) { return x.id === state.selectedId; });
    if (sel) html += renderSheet(sel, filtered);
  }

  html += '</div>';
  root.innerHTML = html;
  attachEvents(filtered);
}

  } else {
    html += '<button class="delete-link" id="askDelete">Supprimer définitivement</button>';
  }

  html += '</div></div>';
  return html;
}

function handlePhotoFile(file, cb) {
  var reader = new FileReader();
  reader.onload = function (e) {
    var img = new Image();
    img.onload = function () {
      var maxW = 480;
      var scale = Math.min(1, maxW / img.width);
      var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function attachEvents(filtered) {
  var changeAuthor = document.getElementById('changeAuthor');
  if (changeAuthor) changeAuthor.addEventListener('click', function () {
    logout();
    render();
  });

  var openUserAdmin = document.getElementById('openUserAdmin');
  if (openUserAdmin) openUserAdmin.addEventListener('click', function () {
    setState({ showUserAdmin: true, userList: null });
    fetchAllUsersRemote().then(function (list) {
      setState({ userList: list });
    }).catch(function () {
      setState({ error: 'Impossible de charger la liste des comptes.' });
    });
  });

  var userAdminOverlay = document.getElementById('userAdminOverlay');
  if (userAdminOverlay) {
    userAdminOverlay.addEventListener('click', function (e) { if (e.target === userAdminOverlay) setState({ showUserAdmin: false, confirmDeleteUserId: null }); });
    document.getElementById('userAdminClose').addEventListener('click', function () { setState({ showUserAdmin: false, confirmDeleteUserId: null }); });
    document.getElementById('userAdminSheet').addEventListener('click', function (e) { e.stopPropagation(); });

    document.querySelectorAll('[data-toggle-active]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var uid = btn.getAttribute('data-toggle-active');
        var u = state.userList.find(function (x) { return x.uid === uid; });
        var newActif = !(u.actif !== false);
        var newList = state.userList.map(function (x) { return x.uid === uid ? Object.assign({}, x, { actif: newActif }) : x; });
        setState({ userList: newList });
        setUserActiveRemote(u, newActif).catch(function () { setState({ error: "Échec de la mise à jour du compte." }); });
      });
    });
    document.querySelectorAll('[data-ask-delete-user]').forEach(function (btn) {
      btn.addEventListener('click', function () { setState({ confirmDeleteUserId: btn.getAttribute('data-ask-delete-user') }); });
    });
    document.querySelectorAll('[data-confirm-delete-user]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var uid = btn.getAttribute('data-confirm-delete-user');
        var newList = state.userList.filter(function (x) { return x.uid !== uid; });
        setState({ userList: newList, confirmDeleteUserId: null });
        deleteUserProfileRemote(uid).catch(function () { setState({ error: "Échec de la suppression du compte." }); });
      });
    });
  }

  var openAccount = document.getElementById('openAccount');
  if (openAccount) openAccount.addEventListener('click', function () { setState({ showAccount: true }); });

  var accountOverlay = document.getElementById('accountOverlay');
  if (accountOverlay) {
    accountOverlay.addEventListener('click', function (e) { if (e.target === accountOverlay) setState({ showAccount: false }); });
    document.getElementById('accountClose').addEventListener('click', function () { setState({ showAccount: false }); });
    document.getElementById('accountSheet').addEventListener('click', function (e) { e.stopPropagation(); });
    document.getElementById('accountSave').addEventListener('click', function () {
      var prenom = document.getElementById('accPrenom').value.trim();
      var nom = document.getElementById('accNom').value.trim();
      var grade = document.getElementById('accGrade').value.trim();
      var bureau = document.getElementById('accBureau').value.trim();
      if (!prenom || !nom) return;
      var profile = Object.assign({}, state.userProfile, { prenom: prenom, nom: nom, grade: grade, bureau: bureau });
      saveUserProfile(state.auth.uid, profile).then(function () {
        applyProfile(profile);
        setState({ showAccount: false });
      }).catch(function () {
        setState({ error: "Échec de l'enregistrement du profil." });
      });
    });
  }

  var searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', function (e) {
      state.query = e.target.value;
      render();
      var el = document.getElementById('searchInput');
      if (el) { el.focus(); var p = el.value.length; el.setSelectionRange(p, p); }
    });
  }

  document.querySelectorAll('[data-filter]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var f = btn.getAttribute('data-filter');
      setState({ filterStatus: state.filterStatus === f ? 'all' : f });
    });
  });
  document.querySelectorAll('[data-bureau]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var b = btn.getAttribute('data-bureau');
      localStorage.setItem('fleetFilterBureau', b || '');
      setState({ filterBureau: b || null, filterTournee: null });
    });
  });
  document.querySelectorAll('[data-tournee]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var t = btn.getAttribute('data-tournee');
      setState({ filterTournee: t || null });
    });
  });

  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', function () { exportCsv(filtered); });
  var exportXlsxBtn = document.getElementById('exportXlsxBtn');
  if (exportXlsxBtn) exportXlsxBtn.addEventListener('click', function () { exportXlsx(filtered); });

  document.querySelectorAll('[data-view]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var view = btn.getAttribute('data-view');
      setState({
        showArchived: view === 'archives',
        showRestitues: view === 'restitues',
        filterStatus: 'all',
        filterTournee: null,
      });
    });
  });

  document.querySelectorAll('[data-open]').forEach(function (btn) {
    btn.addEventListener('click', function () { setState({ selectedId: btn.getAttribute('data-open') }); });
  });

  var addBtn = document.getElementById('addBtn');
  if (addBtn) addBtn.addEventListener('click', function () { setState({ showNew: true }); });

  var modalOverlay = document.getElementById('modalOverlay');
  if (modalOverlay) {
    modalOverlay.addEventListener('click', function (e) { if (e.target === modalOverlay) setState({ showNew: false }); });
    document.getElementById('modalClose').addEventListener('click', function () { setState({ showNew: false }); });
    document.getElementById('modalSheet').addEventListener('click', function (e) { e.stopPropagation(); });
    document.getElementById('newSave').addEventListener('click', function () {
      var plaque = document.getElementById('newPlaque').value.trim();
      if (!plaque) return;
      var v = Object.assign(emptyVehicle(), {
        plaque: plaque,
        bureau: document.getElementById('newBureau').value.trim(),
        marque: document.getElementById('newMarque').value,
        tournee: document.getElementById('newTournee').value.trim(),
        km: Number(document.getElementById('newKm').value) || 0,
        kmDernierEntretien: Number(document.getElementById('newKmService').value) || 0,
      });
      addHistory(v, 'Véhicule ajouté à la flotte');
      saveVehicle(v);
      setState({ showNew: false });
    });
  }

  var sheetOverlay = document.getElementById('sheetOverlay');
  if (sheetOverlay) {
    sheetOverlay.addEventListener('click', function (e) { if (e.target === sheetOverlay) setState({ selectedId: null, confirmDeleteId: null, confirmRestitueId: null }); });
    document.getElementById('sheetClose').addEventListener('click', function () { setState({ selectedId: null, confirmDeleteId: null, confirmRestitueId: null }); });
    document.getElementById('sheetBox').addEventListener('click', function (e) { e.stopPropagation(); });

    var current = state.vehicles.find(function (v) { return v.id === state.selectedId; });

    document.getElementById('markServiced').addEventListener('click', function () {
      var km = Number(document.getElementById('editKm').value) || 0;
      document.getElementById('editKmService').value = km;
    });

    var markPneusAvant = document.getElementById('markPneusAvant');
    if (markPneusAvant) markPneusAvant.addEventListener('click', function () {
      document.getElementById('editPneuxAvantDate').value = new Date().toISOString().slice(0, 10);
    });
    var markPneusArriere = document.getElementById('markPneusArriere');
    if (markPneusArriere) markPneusArriere.addEventListener('click', function () {
      document.getElementById('editPneuxArriereDate').value = new Date().toISOString().slice(0, 10);
    });

    var panneSwitch = document.getElementById('panneSwitch');
    if (panneSwitch) panneSwitch.addEventListener('click', function () {
      panneSwitch.classList.toggle('on');
      var field = document.getElementById('panneNoteField');
      if (field) field.style.display = panneSwitch.classList.contains('on') ? '' : 'none';
    });

    var addPhotoBtn = document.getElementById('addPhotoBtn');
    var photoInput = document.getElementById('photoInput');
    if (addPhotoBtn && photoInput) {
      addPhotoBtn.addEventListener('click', function () { photoInput.click(); });
      photoInput.addEventListener('change', function () {
        if (!photoInput.files || !photoInput.files[0]) return;
        handlePhotoFile(photoInput.files[0], function (dataUrl) {
          var updated = Object.assign({}, current, { photo: dataUrl });
          addHistory(updated, 'Photo ajoutée');
          saveVehicle(updated);
          setState({ selectedId: updated.id });
        });
      });
    }
    var removePhoto = document.getElementById('removePhoto');
    if (removePhoto) removePhoto.addEventListener('click', function () {
      var updated = Object.assign({}, current, { photo: '' });
      addHistory(updated, 'Photo supprimée');
      saveVehicle(updated);
      setState({ selectedId: updated.id });
    });

    document.getElementById('sheetSave').addEventListener('click', function () {
      var newKm = Number(document.getElementById('editKm').value) || 0;
      var newKmService = Number(document.getElementById('editKmService').value) || 0;
      var newEnPanne = panneSwitch ? panneSwitch.classList.contains('on') : current.enPanne;
      var panneNoteEl = document.getElementById('panneNote');
      var newPanneNote = panneNoteEl ? panneNoteEl.value : current.panneNote;

      var newPneuxAvantDate = document.getElementById('editPneuxAvantDate').value;
      var newPneuxArriereDate = document.getElementById('editPneuxArriereDate').value;
      var newPneuxNote = document.getElementById('editPneux').value.trim();
      var newGeneralNote = document.getElementById('editGeneralNote').value.trim();

      var updated = Object.assign({}, current, {
        marque: document.getElementById('editMarque').value,
        bureau: document.getElementById('editBureau').value.trim(),
        tournee: document.getElementById('editTournee').value.trim(),
        km: newKm,
        kmDernierEntretien: newKmService,
        assuranceDate: document.getElementById('editAssurance').value,
        enPanne: newEnPanne,
        panneNote: newPanneNote,
        pneuxAvantDate: newPneuxAvantDate,
        pneuxArriereDate: newPneuxArriereDate,
        pneuxNote: '',
        generalNote: '',
      });

      if (newKm !== current.km) addHistory(updated, 'Mise à jour kilométrage', current.km + ' → ' + newKm + ' km');
      if (newKmService !== current.kmDernierEntretien) addHistory(updated, 'Entretien effectué', newKmService + ' km');
      if (newEnPanne && !current.enPanne) addHistory(updated, 'Panne déclarée', newPanneNote);
      if (!newEnPanne && current.enPanne) addHistory(updated, 'Panne résolue');
      if (newPneuxAvantDate !== (current.pneuxAvantDate || '')) addHistory(updated, 'Pneus avant changés', newPneuxAvantDate ? new Date(newPneuxAvantDate + 'T00:00:00').toLocaleDateString('fr-FR') : '(date effacée)');
      if (newPneuxArriereDate !== (current.pneuxArriereDate || '')) addHistory(updated, 'Pneus arrière changés', newPneuxArriereDate ? new Date(newPneuxArriereDate + 'T00:00:00').toLocaleDateString('fr-FR') : '(date effacée)');
      if (newPneuxNote) addHistory(updated, 'Note pneus', newPneuxNote);
      if (newGeneralNote) addHistory(updated, 'Note générale', newGeneralNote);

      saveVehicle(updated);
      setState({ selectedId: null });
    });

    var askRestitue = document.getElementById('askRestitue');
    if (askRestitue) askRestitue.addEventListener('click', function () { setState({ confirmRestitueId: state.selectedId }); });
    var confirmRestitueYes = document.getElementById('confirmRestitueYes');
    if (confirmRestitueYes) confirmRestitueYes.addEventListener('click', function () {
      var updated = Object.assign({}, current, { restitue: true, restitueDate: new Date().toISOString().slice(0, 10) });
      addHistory(updated, 'Véhicule restitué');
      saveVehicle(updated);
      setState({ selectedId: null, confirmRestitueId: null });
    });
    var confirmRestitueNo = document.getElementById('confirmRestitueNo');
    if (confirmRestitueNo) confirmRestitueNo.addEventListener('click', function () { setState({ confirmRestitueId: null }); });
    var unrestitute = document.getElementById('unrestitute');
    if (unrestitute) unrestitute.addEventListener('click', function () {
      var updated = Object.assign({}, current, { restitue: false, restitueDate: '' });
      addHistory(updated, 'Véhicule réintégré dans la flotte');
      saveVehicle(updated);
      setState({ selectedId: null });
    });

    var toggleArchive = document.getElementById('toggleArchive');
    if (toggleArchive) toggleArchive.addEventListener('click', function () {
      var updated = Object.assign({}, current, { archived: !current.archived });
      addHistory(updated, current.archived ? 'Désarchivé' : 'Archivé');
      saveVehicle(updated);
      setState({ selectedId: null });
    });

    var askDelete = document.getElementById('askDelete');
    if (askDelete) askDelete.addEventListener('click', function () { setState({ confirmDeleteId: state.selectedId }); });
    var yesBtn = document.getElementById('confirmDeleteYes');
    if (yesBtn) yesBtn.addEventListener('click', function () { removeVehicle(state.selectedId); });
    var noBtn = document.getElementById('confirmDeleteNo');
    if (noBtn) noBtn.addEventListener('click', function () { setState({ confirmDeleteId: null }); });
  }
}

render();
if (state.auth) { startPolling(); }
</script>
</body>
</html>
